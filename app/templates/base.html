<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BehaviorCI{% endblock %}</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-raised: #161b22;
    --bg-card: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --green-dim: #2ea043;
    --red: #f85149;
    --red-dim: #ff7b72;
    --amber: #d29922;
    --accent: #58a6ff;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    margin: 0;
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .brand .dot { color: var(--green); }
  .tagline { color: var(--text-dim); font-size: 13px; font-family: var(--mono); }
  main { max-width: 1040px; margin: 0 auto; padding: 32px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h2 { font-size: 16px; color: var(--text-dim); font-weight: 500; margin: 0 0 24px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card:hover { border-color: #444c56; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .meta { color: var(--text-dim); font-size: 13px; font-family: var(--mono); }
  .badge {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge.pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.fail { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge.drift { background: rgba(210,153,34,0.15); color: var(--amber); }
  .pass-bar { height: 6px; border-radius: 3px; background: var(--bg-raised); overflow: hidden; margin-top: 10px; }
  .pass-bar-fill { height: 100%; background: var(--green); }
  .diff-line {
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 3px;
    white-space: pre-wrap;
  }
  .diff-minus { background: rgba(248,81,73,0.12); color: var(--red-dim); }
  .diff-plus { background: rgba(63,185,80,0.12); color: var(--green); }
  .diff-amber { background: rgba(210,153,34,0.12); color: var(--amber); }
  .diff-block { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .diff-header { background: var(--bg-raised); padding: 8px 12px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  .empty { color: var(--text-dim); font-style: italic; padding: 32px; text-align: center; border: 1px dashed var(--border); border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; font-family: var(--mono); font-size: 12px; }
  .score { font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <div class="brand">behavior<span class="dot">CI</span></div>
  <div style="display:flex; align-items:center; gap:16px;">
    <div class="tagline">the git diff for AI behavior</div>
    {% if org %}
    <div class="meta" style="border-left:1px solid var(--border); padding-left:16px;">
      {{ org.name }} &middot; <a href="/logout">log out</a>
    </div>
    {% endif %}
  </div>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
